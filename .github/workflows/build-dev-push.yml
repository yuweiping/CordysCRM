name: Build Docker On Dev-Yu Push

on:
  push:
    branches:
      - dev-yu
    paths-ignore:
      - '.github/**'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout
      - name: Checkout dev-yu
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2️⃣ 获取当前最新 tag
      - name: Get latest tag
        id: tag
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "latest")
          echo "Detected tag: $TAG"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      # 3️⃣ Setup QEMU
      - uses: docker/setup-qemu-action@v3

      # 4️⃣ Setup Buildx
      - uses: docker/setup-buildx-action@v3

      # 5️⃣ 登录 DockerHub
      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 6️⃣ 构建并推送
      - name: Build & Push
        run: |
          TAG=${{ steps.tag.outputs.tag }}

          docker buildx build \
            --platform linux/amd64 \
            --push \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/cordys-crm-ce:$TAG \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/cordys-crm-ce:latest \
            -f installer/Dockerfile .