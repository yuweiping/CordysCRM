name: Sync Upstream Tag → Merge → Build → Notify

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  sync-and-build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout 当前仓库 dev-yu
      - name: Checkout fork (dev-yu)
        uses: actions/checkout@v4
        with:
          ref: dev-yu
          fetch-depth: 0
          persist-credentials: true

      # 2️⃣ 添加 upstream
      - name: Add upstream & fetch tags
        run: |
          git remote add upstream https://github.com/1Panel-dev/CordysCRM.git 2>/dev/null || true
          git fetch upstream --tags --prune

      # 3️⃣ 获取 upstream 最新 tag
      - name: Detect latest upstream tag
        id: detect
        run: |
          UPSTREAM_TAG=$(git ls-remote --tags upstream | grep -v '{}' | awk '{print $2}' | sed 's/refs\/tags\///' | sort -V | tail -n 1 | xargs)
          LOCAL_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          echo "Upstream latest tag: $UPSTREAM_TAG"
          echo "Local latest tag: $LOCAL_TAG"

          if [[ -n "$UPSTREAM_TAG" && "$UPSTREAM_TAG" != "$LOCAL_TAG" ]]; then
            echo "has_new_tag=true" >> $GITHUB_OUTPUT
            echo "latest_tag=$UPSTREAM_TAG" >> $GITHUB_OUTPUT
          else
            echo "has_new_tag=false" >> $GITHUB_OUTPUT
          fi

      # 4️⃣ 合并 upstream tag 对应 commit
      - name: Merge upstream tag into dev-yu
        if: steps.detect.outputs.has_new_tag == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git checkout dev-yu
          git merge --no-edit --strategy-option theirs ${{ steps.detect.outputs.latest_tag }}

          git push origin dev-yu

      # 5️⃣ 获取 Release Notes
      - name: Get release notes
        if: steps.detect.outputs.has_new_tag == 'true'
        id: notes
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.detect.outputs.latest_tag }}
        run: |
          NOTES=$(gh api repos/1Panel-dev/CordysCRM/releases/tags/$TAG --jq '.body' 2>/dev/null || echo "无发布说明")
          NOTES_ESCAPED=$(echo "$NOTES" | sed 's/"/\\"/g' | sed ':a;N;$!ba;s/\n//g')
          echo "release_notes=$NOTES_ESCAPED" >> $GITHUB_OUTPUT

      # 6️⃣ 构建 Docker
      - name: Setup QEMU
        if: steps.detect.outputs.has_new_tag == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Setup Buildx
        if: steps.detect.outputs.has_new_tag == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login DockerHub
        if: steps.detect.outputs.has_new_tag == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Docker
        if: steps.detect.outputs.has_new_tag == 'true'
        run: |
          TAG=${{ steps.detect.outputs.latest_tag }}

          docker buildx build \
            --platform linux/amd64 \
            --push \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/cordys-crm-ce:$TAG \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/cordys-crm-ce:latest \
            -f installer/Dockerfile .

      # 7️⃣ PushPlus 通知
      - name: PushPlus Notify
        if: steps.detect.outputs.has_new_tag == 'true'
        uses: actions/github-script@v7
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          TAG: ${{ steps.detect.outputs.latest_tag }}
          NOTES: ${{ steps.notes.outputs.release_notes }}
        with:
          script: |
            const data = {
              token: process.env.PUSHPLUS_TOKEN,
              title: `CordysCRM 新版本 ${process.env.TAG}`,
              content: `新版本：${process.env.TAG}<br>发布说明：${process.env.NOTES}`,
              template: "html"
            };

            await fetch('https://www.pushplus.plus/send', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(data)
            });
